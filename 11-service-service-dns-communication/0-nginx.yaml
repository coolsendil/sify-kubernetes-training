apiVersion: v1
kind: Namespace
metadata: 
  name: ns-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: ns-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: ns-b
spec:
  selector:
    app: service-b
  ports:
  - port: 80
    targetPort: 80
