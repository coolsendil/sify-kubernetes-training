apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-storage-demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-storage-demo
  template:
    metadata:
      labels:
        app: nginx-storage-demo
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html

      volumes:
      - name: nginx-storage
        persistentVolumeClaim:
          claimName: nginx-pvc