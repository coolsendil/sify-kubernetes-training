apiVersion: v1
kind: Pod
metadata:
  name: nginx-app
  namespace: demo
  labels:
    app.kubernetes.io/name: myapp
spec:
  containers:
  - name: nginx-app
    image: nginx
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    envFrom:
      - configMapRef:
          name:  myapp-cm
    ports:
      - containerPort: 80
