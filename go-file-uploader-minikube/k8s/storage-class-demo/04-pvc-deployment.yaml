apiVersion: v1
kind: PersistentVolume
metadata:
  name: upload-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/uploads

--- 

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-pvc2
  namespace : upload-demo
spec:
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader-sc
  namespace: upload-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uploader-hostpath
  template:
    metadata:
      labels:
        app: uploader-hostpath
    spec:
      containers:
      - name: app
        image: go-file-uploader:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: APP_TITLE
          value: Go File Uploader - hostPath
        - name: ACCESS_NOTE
          value: Files are stored on the selected node path /var/lib/minikube-uploads and survive pod restart on the same node.
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: uploads
          mountPath: /data/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: upload-pvc2
---
apiVersion: v1
kind: Service
metadata:
  name: uploader-hostpath
  namespace: upload-demo
spec:
  selector:
    app: uploader-hostpath
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30082
  type: NodePort
