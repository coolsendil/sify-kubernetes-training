apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespce: kube-system
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata: 
      labels:
        app: fluentd
    spec:
      containers:
        - name: fluentd 
          image: fluent/fluentd:v1.16

          volumeMounts:
          - name: varlog
            mountPath: /var/log
          - name: containers
            mountPath: /var/log/containers
            
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: containers
        hostPath:
          path: /var/log/containers
