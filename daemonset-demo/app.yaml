apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-demo
  template:
    metadata:
      labels:
        app: log-demo
    spec:
      containers:
      - name: log-demo
        image: busybox
        command: ["/bin/sh"]
        args:
          - -c
          - while true; do echo "Hello from Kubernetes $(date)"; sleep 5; done