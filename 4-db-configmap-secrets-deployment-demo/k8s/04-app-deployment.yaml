## jpalaparthi/sify-go-demo:v1.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app
  namespace: db-demo-ns
  annotations:
    kubernetes.io/change-cause: "initial go-app v0.1 deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
      - name: go-app
        image: jpalaparthi/sify-go-demo:v1.0
        ports:
        - containerPort: 8080

        envFrom: 
        - configMapRef:
            name: postgress-config
        - secretRef:
            name: postgres-secret
          
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080 
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1 
kind: Service 
metadata:
  name: go-app-service
  namespace: db-demo-ns
spec:
  type: NodePort
  selector:
    app: go-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080




