apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: db-demo-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432

        envFrom: 
        - configMapRef:
            name: postgress-config
        - secretRef:
            name: postgres-secret
          
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

        readinessProbe:
          exec:
            command: ["sh","-c","pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          exec:
            command: ["sh","-c","pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
          initialDelaySeconds: 20
          periodSeconds: 10

      volumes:
        - name: postgres-data
          emptyDir: {}




