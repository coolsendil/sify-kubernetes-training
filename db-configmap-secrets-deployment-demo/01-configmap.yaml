apiVersion: v1 
kind: ConfigMap
metadata:
  name: postgress-config
  namespace: db-demo-ns
data:
  POSTGRES_DB: appdb
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppassword
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: appdb
  DB_USER: appuser
  DB_PASSWORD: apppassword
  DB_SSLMODE: disable
  APP_PORT: "8080"