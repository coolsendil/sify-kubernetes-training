#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - tar
  - nfs-common
  - unzip
  - git
  - jq
  - wget

write_files:
  - path: /usr/local/bin/client-setup.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      ETCD_VER="${ETCD_VER:-v3.5.15}"
      KUBECTL_VER="${KUBECTL_VER:-v1.30.0}"
      UBUNTU_HOME="/home/ubuntu"
      KUBE_DIR="${UBUNTU_HOME}/.kube"

      log() {
        echo
        echo "[$(date '+%F %T')] $*"
        echo
      }

      detect_arch() {
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64) BIN_ARCH="amd64" ;;
          aarch64|arm64) BIN_ARCH="arm64" ;;
          *)
            echo "Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac
        log "Detected architecture: $ARCH -> $BIN_ARCH"
      }

      install_etcdctl() {
        log "Installing etcdctl"

        cd /tmp
        rm -rf /tmp/etcd-download
        mkdir -p /tmp/etcd-download
        cd /tmp/etcd-download

        curl -fLO "https://github.com/etcd-io/etcd/releases/download/${ETCD_VER}/etcd-${ETCD_VER}-linux-${BIN_ARCH}.tar.gz"
        tar -xzf "etcd-${ETCD_VER}-linux-${BIN_ARCH}.tar.gz"

        install -m 0755 "etcd-${ETCD_VER}-linux-${BIN_ARCH}/etcdctl" /usr/local/bin/etcdctl

        etcdctl version

        rm -rf /tmp/etcd-download
      }

      install_kubectl() {
        log "Installing kubectl ${KUBECTL_VER}"

        cd /tmp
        rm -f kubectl

        curl -fLO "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/${BIN_ARCH}/kubectl"

        chmod +x kubectl
        install -m 0755 kubectl /usr/local/bin/kubectl

        kubectl version --client
      }

      install_docker() {
        log "Installing Docker Engine"

        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

        cat >/etc/apt/sources.list.d/docker.sources <<EOF
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
      EOF

        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

        systemctl enable docker
        systemctl enable containerd
        systemctl restart containerd
        systemctl restart docker

        docker --version
        docker compose version
      }

      configure_ubuntu_docker_access() {
        log "Granting docker access to ubuntu user"

        usermod -aG docker ubuntu

        mkdir -p "${UBUNTU_HOME}/.docker"
        chown -R ubuntu:ubuntu "${UBUNTU_HOME}/.docker"

        log "Docker access configured for ubuntu"
      }

      verify_tools() {
        log "Verifying installed tools"

        command -v kubectl
        command -v etcdctl
        command -v docker
        command -v git
        command -v jq
        command -v unzip
        command -v wget

        log "All required tools are available"
      }

      setup_kube_dir() {
        log "Creating ${KUBE_DIR}"

        mkdir -p "${KUBE_DIR}"
        chown -R ubuntu:ubuntu "${KUBE_DIR}"
        chmod 700 "${KUBE_DIR}"

        touch "${KUBE_DIR}/config"
        chown ubuntu:ubuntu "${KUBE_DIR}/config"
        chmod 600 "${KUBE_DIR}/config"
      }

      setup_shell_aliases() {
        log "Adding kubectl alias"

        grep -qxF 'alias k=kubectl' "${UBUNTU_HOME}/.bashrc" || echo 'alias k=kubectl' >> "${UBUNTU_HOME}/.bashrc"
        chown ubuntu:ubuntu "${UBUNTU_HOME}/.bashrc"
      }

      main() {
        detect_arch
        install_etcdctl
        install_kubectl
        install_docker
        configure_ubuntu_docker_access
        verify_tools
        setup_kube_dir
        setup_shell_aliases

        log "Client setup complete"
      }

      main "$@"

runcmd:
  - bash /usr/local/bin/client-setup.sh > /var/log/client-setup.log 2>&1