#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - containerd
  - nfs-common
  - jq
  - tar

write_files:
  - path: /usr/local/bin/k8s-worker-setup.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      K8S_MINOR_VERSION="${K8S_MINOR_VERSION:-v1.30}"
      JOIN_SCRIPT_PATH="${JOIN_SCRIPT_PATH:-/home/ubuntu/join-worker.sh}"
      CRI_SOCKET="unix:///run/containerd/containerd.sock"

      log() {
        echo
        echo "[$(date '+%F %T')] $*"
        echo
      }

      retry() {
        local n=0
        local max=5
        local delay=5
        until "$@"; do
          n=$((n+1))
          if [ "$n" -ge "$max" ]; then
            echo "Command failed after ${max} attempts: $*"
            return 1
          fi
          sleep "$delay"
        done
      }

      disable_swap() {
        log "Disabling swap"
        swapoff -a || true
        sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
      }

      configure_kernel() {
        log "Loading kernel modules and sysctl"
        cat >/etc/modules-load.d/k8s.conf <<EOF
      overlay
      br_netfilter
      EOF

        modprobe overlay
        modprobe br_netfilter

        cat >/etc/sysctl.d/99-kubernetes-cri.conf <<EOF
      net.bridge.bridge-nf-call-iptables=1
      net.bridge.bridge-nf-call-ip6tables=1
      net.ipv4.ip_forward=1
      EOF

        sysctl --system
      }

      configure_containerd() {
        log "Configuring containerd"
        mkdir -p /etc/containerd
        containerd config default >/etc/containerd/config.toml

        sed -ri 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        sed -ri 's#sandbox_image = ".*"#sandbox_image = "registry.k8s.io/pause:3.9"#' /etc/containerd/config.toml

        systemctl daemon-reload
        systemctl enable containerd
        systemctl restart containerd
      }

      install_kubernetes_packages() {
        log "Installing Kubernetes packages from pkgs.k8s.io"
        mkdir -p /etc/apt/keyrings

        retry bash -c "curl -fsSL https://pkgs.k8s.io/core:/stable:/${K8S_MINOR_VERSION}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg"

        cat >/etc/apt/sources.list.d/kubernetes.list <<EOF
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/${K8S_MINOR_VERSION}/deb/ /
      EOF

        retry apt-get update
        retry apt-get install -y kubelet kubeadm kubectl
        apt-mark hold kubelet kubeadm kubectl
        systemctl enable kubelet
      }

      wait_for_join_script() {
        log "Waiting for join script at ${JOIN_SCRIPT_PATH}"
        local timeout=1800
        local elapsed=0
        local interval=10

        while [ ! -f "${JOIN_SCRIPT_PATH}" ]; do
          sleep "${interval}"
          elapsed=$((elapsed + interval))
          if [ "${elapsed}" -ge "${timeout}" ]; then
            echo "Timed out waiting for join script: ${JOIN_SCRIPT_PATH}"
            exit 1
          fi
        done

        chmod +x "${JOIN_SCRIPT_PATH}"
        chown ubuntu:ubuntu "${JOIN_SCRIPT_PATH}" || true
      }

      join_cluster() {
        if [ -f /etc/kubernetes/kubelet.conf ]; then
          log "Worker already joined; skipping kubeadm join"
          return 0
        fi

        log "Running kubeadm join"
        bash "${JOIN_SCRIPT_PATH}" --cri-socket "${CRI_SOCKET}"
      }

      main() {
        disable_swap
        configure_kernel
        configure_containerd
        install_kubernetes_packages
        wait_for_join_script
        join_cluster
        log "Worker setup complete"
      }

      main "$@"

runcmd:
  - bash /usr/local/bin/k8s-worker-setup.sh > /var/log/k8s-worker-setup.log 2>&1