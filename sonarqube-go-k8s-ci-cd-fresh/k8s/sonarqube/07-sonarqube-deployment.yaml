apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/sonarqube/data /opt/sonarqube/extensions /opt/sonarqube/logs /opt/sonarqube/temp
              chown -R 1000:1000 /opt/sonarqube
              chmod -R 775 /opt/sonarqube
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
      containers:
        - name: sonarqube
          image: sonarqube:community
          ports:
            - containerPort: 9000
          envFrom:
            - secretRef:
                name: sonarqube-secret
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sonarqube-pvc